<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="image" href="/logo.png" />
  <script>
    document.addEventListener('touchstart', function (event) {
      if (event.touches.length > 1) {
        event.preventDefault();
      }
    }, { passive: false });
    document.addEventListener('gesturestart', function (event) {
      event.preventDefault();
    });
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      const now = (new Date()).getTime();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>
  <meta name="description"
    content="Learn high-income digital skills, web design, and freelancing to build a highly profitable online business and secure international clients. Unlock your potential with Amplified Skills." />
  <meta property="og:title" content="Amplified Skills — Master In-Demand Digital Skills & Freelancing" />
  <meta property="og:description"
    content="Learn high-income digital skills, web design, and freelancing to build a highly profitable online business and secure international clients." />
  <meta property="og:type" content="website" />
  <title>Amplified Skills — Master In-Demand Digital Skills & Freelancing</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <!-- Facebook Pixel Code -->
  <script>
    !function (f, b, e, v, n, t, s) {
      if (f.fbq) return; n = f.fbq = function () {
        n.callMethod ?
          n.callMethod.apply(n, arguments) : n.queue.push(arguments)
      };
      if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
      n.queue = []; t = b.createElement(e); t.async = !0;
      t.src = v; s = b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t, s)
    }(window, document, 'script',
      'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '776476416911978');
    fbq('track', 'PageView');
  </script>
  <!-- End Facebook Pixel Code -->
</head>

<body>
  <!-- Facebook Pixel Code (noscript) -->
  <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=776476416911978&ev=PageView&noscript=1" /></noscript>
  <div id="root">
    <!-- Inline loading state to prevent flash of white on initial load -->
    <div style="position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#050b14;color:#fff;font-family:sans-serif;z-index:9999;">
      <div style="display:flex;flex-direction:column;align-items:center;position:relative;">
        <!-- Ambient glow behind the logo -->
        <div style="position:absolute;width:160px;height:160px;background:radial-gradient(circle, rgba(37,99,235,0.25) 0%, rgba(37,99,235,0) 70%);top:50%;left:50%;transform:translate(-50%, -50%);filter:blur(24px);animation:ambient-glow 3s ease-in-out infinite;"></div>
        
        <!-- Pulse-animated Logo -->
        <img src="/logo.png" alt="Amplified Skills" style="height:64px;width:auto;max-width:220px;object-fit:contain;margin-bottom:36px;filter:drop-shadow(0 0 10px rgba(37,99,235,0.15));animation:logo-pulse 2.2s ease-in-out infinite;" />
        
        <!-- Premium Circular Glowing Spinner -->
        <div class="premium-spinner"></div>
      </div>
      <style>
        .premium-spinner {
          width: 32px;
          height: 32px;
          border: 3px solid rgba(255, 255, 255, 0.05);
          border-top-color: #2563eb;
          border-right-color: #3b82f6;
          border-radius: 50%;
          animation: spin-loader 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin-loader {
          to { transform: rotate(360deg); }
        }
        @keyframes logo-pulse {
          0%, 100% { transform: scale(1); opacity: 0.85; filter: drop-shadow(0 0 8px rgba(37,99,235,0.1)); }
          50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 16px rgba(37,99,235,0.4)); }
        }
        @keyframes ambient-glow {
          0%, 100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.7; }
          50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }
      </style>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
